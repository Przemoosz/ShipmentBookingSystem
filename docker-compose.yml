services:
  shipment_booking_system.api:
    image: shipment_booking_system.api
    container_name: shipment_api
    build:
      context: .
      dockerfile: src/ShipmentBookingSystem.Api/Dockerfile
    ports:
      - "8080:8080"
      - "8081:8081"
    environment:
      - ConnectionStrings__Default=Server=shipment_db,1433;Database=master;User Id=sa;Password=TwojeMocneHaslo123!;TrustServerCertificate=True
      - Kafka__BootstrapServers=shipment_booking_system.kafka:9092

    depends_on:
      - shipment_booking_system.database
      - shipment_booking_system.kafka
  shipment_booking_system.database:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: shipment_db
    ports:
      - "1433:1433"
    environment:
      - ACCEPT_EULA=Y
      - MSSQL_SA_PASSWORD=TwojeMocneHaslo123!
    volumes:
      - sql_data:/var/opt/mssql
  shipment_booking_system.kafka:
    image: apache/kafka:latest
    container_name: shipment_kafka
    ports:
      - "9092:9092"
    environment:
      - KAFKA_NODE_ID=1
      - KAFKA_PROCESS_ROLES=broker,controller
      - KAFKA_LISTENERS=PLAINTEXT://:9092,CONTROLLER://:9093
      - KAFKA_ADVERTISED_LISTENERS=PLAINTEXT://shipment_booking_system.kafka:9092
      - KAFKA_CONTROLLER_QUORUM_VOTERS=1@shipment_booking_system.kafka:9093
      - KAFKA_CONTROLLER_LISTENER_NAMES=CONTROLLER
  shipment_booking_system.kafdrop:
    image: obsidiandynamics/kafdrop:latest
    container_name: shipment_kafdrop
    ports:
      - "9000:9000"
    environment:
      - KAFKA_BROKERCONNECT=shipment_booking_system.kafka:9092
    depends_on:
      - shipment_booking_system.kafka
volumes:
  sql_data: